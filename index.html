<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="page-title">Petzildo - Coleção</title>
    <meta name="description" content="Conheça nossos amigos pets no Petzildo!">
    <meta property="og:title" id="og-title" content="Petzildo">
    <meta property="og:description" id="og-desc" content="Clique para ver a cartinha deste pet!">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ad-container top-ad">
        <p>Anúncio</p>
        </div>

    <main id="pet-display">
        <p class="loading">Buscando pet...</p>
    </main>

    <div class="navigation-container">
        <div id="pagination" class="pagination-dots">
            </div>
    
        <button id="next-btn" onclick="nextPet()">VER PRÓXIMO PET 🐾</button>
        <button id="random-btn" onclick="randomPet()">VER PET ALEATÓRIO 🎲</button>
    
        <button id="share-btn" onclick="shareWhatsApp()" class="share-btn">
            Compartilhar no WhatsApp 💬
        </button>
    </div>

    <div class="ad-container bottom-ad">
        <p>Anúncio</p>
        </div>

    <script src="script.js"></script>
</body>
</html>
