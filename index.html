<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="page-title">🐾 Petzildo</title>
    <meta name="description" content="Conheça nossos amigos pets no Petzildo!">
    <meta property="og:title" id="og-title" content="Petzildo">
    <meta property="og:description" id="og-desc" content="Clique para ver a cartinha deste pet!">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="ad-container top-ad">
        <script type="text/javascript">
            atOptions = {
                'key' : 'f95477b41aad412b789767be6416723b',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/f95477b41aad412b789767be6416723b/invoke.js"></script>
    </div>

    <header style="text-align: center; margin-bottom: 10px;">
        <h1 style="margin: 0; color: #222;">🐾 Petzildo</h1>
    </header>
    <div style="text-align: center; margin-bottom: 15px;">
        <label style="font-weight: bold; cursor: pointer; background: #fff; padding: 8px 15px; border-radius: 20px; border: 2px solid #e74c3c; color: #e74c3c;">
            <input type="checkbox" id="filter-adoption" onchange="loadSinglePet()"> 🏠 Ver apenas para adoção
        </label>
    </div>

    <main id="pet-display">
        <p class="loading">Buscando pet no Petzildo...</p>
    </main>

    <div class="navigation-container">
        <div id="pagination" class="pagination-dots"></div>

        <button id="download-btn" onclick="downloadCard()" class="download-btn">BAIXAR MINHA CARTINHA 📷</button>
        <button id="next-btn" onclick="nextPet()">VER PRÓXIMO PET 🐾</button>
        <button id="random-btn" onclick="randomPet()">VER PET ALEATÓRIO 🎲</button>
        <button id="share-btn" onclick="shareWhatsApp()" class="share-btn">Compartilhar no WhatsApp 💬</button>

        <a href="https://forms.gle/mTuz9EWua2MQycb96" target="_blank" style="text-decoration: none;">
        <button id="contribute-btn" class="contribute-btn">CADASTRAR MEU PET 🐶🐱</button>
        </a>
    </div>

    <div class="ad-container bottom-ad">
        <script type="text/javascript">
            atOptions = {
                'key' : 'f95477b41aad412b789767be6416723b',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/f95477b41aad412b789767be6416723b/invoke.js"></script>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="" alt="Foto completa">
    </div>

    <script src="script.js"></script>
</body>
</html>
