<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="page-title">Petzildo - Coleção de Pets</title>
    <meta name="description" content="Conheça nossos amigos peludos no Petzildo!">
    <meta property="og:title" id="og-title" content="Petzildo">
    <meta property="og:description" id="og-desc" content="Clique para ver a cartinha deste pet!">
    <meta property="og:image" id="og-image" content="">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ad-container top-ad">
        <p>Anúncio</p>
    </div>

    <header style="text-align: center; margin-bottom: 10px;">
        <h1 style="margin: 0; color: #222;">🐾 Petzildo</h1>
    </header>

    <main id="pet-display">
        <p class="loading">Buscando pet no Petzildo...</p>
    </main>

    <div class="navigation-container">
        <div id="pagination" class="pagination-dots"></div>
        
        <button id="next-btn" onclick="nextPet()">VER PRÓXIMO PET 🐾</button>
        <button id="random-btn" onclick="randomPet()">VER PET ALEATÓRIO 🎲</button>
        <button id="share-btn" onclick="shareWhatsApp()" class="share-btn">Compartilhar no WhatsApp 💬</button>
    </div>

    <div class="ad-container bottom-ad">
        <p>Anúncio</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
